version: '3.8'

networks:
  gmail-assistant-network:
    driver: bridge

services:
  redis:
    image: redis:7-alpine
    container_name: gmail-assistant-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - gmail-assistant-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # api:
