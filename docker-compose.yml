  #     - gmail-assistant-network
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3

  redis-insight:
    image: redislabs/redisinsight:latest
    container_name: gmail-assistant-redis-insight
    ports:
      - "5540:5540"
    volumes:
      - redis_insight_data:/db
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - gmail-assistant-network
    command: sh -c "until nc -z redis 6379; do echo 'Waiting for Redis...'; sleep 2; done; echo 'Redis is ready!'; /usr/local/bin/docker-entrypoint.sh"

volumes:
  redis_data:
    driver: local
  redis_insight_data:
    driver: local